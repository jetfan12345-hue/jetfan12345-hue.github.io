<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="SunLine X1 solar dryer outdoors on a sunny day">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="55%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF59D"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="35%" stop-color="#333"/>
      <stop offset="50%" stop-color="#111"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="glassShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eceff1"/>
    </linearGradient>
    <linearGradient id="patio" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ccc8"/>
      <stop offset="100%" stop-color="#bcaaa4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="800" height="520" fill="url(#sky)"/>
  <circle cx="680" cy="85" r="58" fill="url(#sun)" opacity="0.95"/>
  <ellipse cx="400" cy="470" rx="340" ry="42" fill="#66bb6a" opacity="0.35"/>
  <rect x="0" y="400" width="800" height="120" fill="url(#patio)"/>
  <g filter="url(#shadow)">
    <rect x="250" y="155" width="300" height="265" rx="22" fill="url(#body)" stroke="#cfd8dc" stroke-width="2"/>
    <rect x="268" y="118" width="264" height="48" rx="10" fill="url(#glass)"/>
    <rect x="275" y="122" width="120" height="18" rx="4" fill="url(#glassShine)" opacity="0.5"/>
    <rect x="285" y="195" width="230" height="175" rx="14" fill="url(#glass)"/>
    <rect x="295" y="205" width="90" height="55" rx="6" fill="url(#glassShine)" opacity="0.35"/>
    <rect x="285" y="385" width="230" height="22" rx="11" fill="#f5f5f5" stroke="#e0e0e0"/>
    <circle cx="320" cy="396" r="5" fill="#43a047"/>
    <text x="355" y="401" font-family="Inter, sans-serif" font-size="11" fill="#2e7d32" font-weight="600">SOLAR READY</text>
    <text x="400" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#b0bec5" opacity="0.8">SunLine X1</text>
  </g>
  <text x="400" y="505" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#546e7a">SunLine X1™ — Simple, effective solar drying</text>
</svg>