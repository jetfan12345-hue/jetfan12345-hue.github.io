<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="SunLine X1 retail packaging">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#eeeeee"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="40%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="boxWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="520" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="220" y="100" width="360" height="340" rx="16" fill="url(#boxWhite)" stroke="#e0e0e0" stroke-width="2"/>
    <rect x="240" y="118" width="320" height="52" rx="8" fill="url(#glass)"/>
    <rect x="250" y="124" width="140" height="20" rx="4" fill="url(#shine)" opacity="0.6"/>
    <rect x="255" y="195" width="290" height="200" rx="12" fill="url(#glass)"/>
    <rect x="268" y="208" width="110" height="70" rx="6" fill="url(#shine)" opacity="0.4"/>
    <text x="400" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" fill="#37474f" font-weight="700">SunLine X1™</text>
    <text x="400" y="455" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#607d8b">Solar Drying System</text>
    <rect x="310" y="468" width="180" height="24" rx="12" fill="#e8f5e9" stroke="#c8e6c9"/>
    <text x="400" y="485" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2e7d32" font-weight="600">Everything you need inside</text>
  </g>
</svg>